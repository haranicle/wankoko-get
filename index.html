<style>
  :root {
    --brand-blue: #2a82df;
    --brand-orange: #f0a500;
    --brand-coral: #ff6b6b;
    --text-main: #1c2b3a;
    --text-sub: #5b6b7a;
    --bg: #f4f8fc;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #ffffff 60%);
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .logo {
    width: 96px;
    height: 96px;
    margin: 0 auto 20px;
    filter: drop-shadow(0 8px 16px rgba(42, 130, 223, 0.25));
  }

  h1 {
    font-size: 22px;
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-sub);
    margin: 0 0 32px;
  }

  .status {
    font-size: 14px;
    color: var(--text-sub);
    margin: 0 0 24px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 0 auto 16px;
    border: 3px solid #dde6f0;
    border-top-color: var(--brand-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .store-buttons {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .store-buttons.visible {
    display: flex;
  }

  .store-button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--text-main);
    transition: opacity 0.15s ease;
  }

  .store-button:active {
    opacity: 0.8;
  }

  .store-button.ios {
    background: #111318;
  }

  .store-button.android {
    background: #01875f;
  }

  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-sub);
  }
</style>
</head>

    <h1>ワンココ</h1>
    <p class="subtitle">愛犬との散歩をフレンドと共有</p>

    <div id="autoRedirect">
      <div class="spinner"></div>
      <p class="status">アプリストアに移動しています…</p>
    </div>

    <div id="storeButtons" class="store-buttons">
      <a id="iosButton" class="store-button ios" href="#">App Store で入手</a>
      <a id="androidButton" class="store-button android" href="#">Google Play で入手</a>
    </div>

    <p class="hint">自動的に切り替わらない場合は、上のボタンからお使いの機種を選んでください。</p>
  </div>

  <script>
    var APP_STORE_URL = "https://apps.apple.com/jp/app/%E3%83%AF%E3%83%B3%E3%82%B3%E3%82%B3/id6766434787";
    var PLAY_STORE_URL = "https://hara.s.gy/wankokoandtest";

    function isPlaceholder(url) {
      return !url;
    }

    function detectOS() {
      var ua = navigator.userAgent || "";
      var isIOS =
        /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/.test(ua);

      if (isIOS) return "ios";
      if (isAndroid) return "android";
      return null;
    }

    function showFallback() {
      document.getElementById("autoRedirect").style.display = "none";
    }

    document.getElementById("iosButton").href = APP_STORE_URL;
    document.getElementById("androidButton").href = PLAY_STORE_URL;
    document.getElementById("storeButtons").classList.add("visible");

    var os = detectOS();
    if (os === "ios" && !isPlaceholder(APP_STORE_URL)) {
      location.replace(APP_STORE_URL);
    } else if (os === "android" && !isPlaceholder(PLAY_STORE_URL)) {
      location.replace(PLAY_STORE_URL);
    } else {
      showFallback();
    }
  </script>
